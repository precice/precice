name: Publish Docker release
# This is a workflow to manually request an ubuntu package for an existing release.
# To use:
# - Go to the GitHub repository
# - Go to the Actions tab
# - Select the "Request Docker release" workflow
# - On the top of the list, select "Run workflow"
# - Select the release tag to generate the package for. Example: v2.3.0
# - Select weather to override the latest tag
# - Click "Run Workflow"
#
# This workflow uses the official ubuntu docker images.
on:
  workflow_call:
    inputs:
      version:
        description: 'Version with or without the v prefix'
        required: true
        type: string
      latest:
        description: 'Override precice/precice:latest'
        required: true
        type: boolean
    secrets:
      DOCKERHUB_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      version:
        description: 'Version with or without the v prefix'
        default: "2.1.0"
        required: true
        type: string
      latest:
        description: 'Override precice/precice:latest'
        default: false
        required: true
        type: boolean

jobs:
  package:
    name: 'Release docker precice/precice for ${{ inputs.version }}'
    runs-on: ubuntu-latest
    if: github.repository == 'precice/precice'
    env:
        docker_username: precice
    steps:
      - name: Print input
        env:
          params: "${{ tojson(inputs) }}"
        run: 'echo "${params}" | jq .'
      - name: Check and clean version
        id: version
        run: |
          echo "${{ inputs.version }}" | grep -Pq '^v?\d+\.\d+\.\d+$'
          version="${{ inputs.version }}"
          echo "version=${version#v}" >> "$GITHUB_OUTPUT"
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Get release artifacts
        run: |
          gh release download "v${{ steps.version.outputs.version }}"
          ls -l
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ env.docker_username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push version tag
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: "./tools/releasing/packaging/docker/release.dockerfile"
          tags: ${{ env.docker_username }}/precice:${{ steps.version.outputs.version }}
      - name: Build and push latest tag
        if: ${{ inputs.latest == 'true' }}
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: "./tools/releasing/packaging/docker/release.dockerfile"
          tags: ${{ env.docker_username }}/precice:latest
